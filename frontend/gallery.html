<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <script type="importmap">
    {
        "imports": {
        "three": "https://esm.sh/three",
        "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.3/build/index.module.js"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: sans-serif;
        }

        #canvas {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .item {
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            cursor: grab;
        }

        .item-selected {
            background: rgba(255, 255, 255, 0.15);
        }

        .item:active {
            cursor: grabbing;
        }

        .item-label {
            position: absolute;
            padding: 10px;
            font-size: 12px;
            color: #888;
        }

        nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 30px;
            /*border: 1px solid rgba(255, 255, 255, 0.1);*/
            backdrop-filter: blur(10px);
        }

        nav img {
            height: 20px;
            filter: invert(1);
        }

        .nav-btn {
            color: white;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 10px 15px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            /*transform: translateY(-2px);*/
        }

        #controls {
            position: fixed;
            bottom: 40px;
            left: 30px;
            /*transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.05);*/
            z-index: 1000;
            display: flex;
            gap: 15px;
            font-size: small;
        }

        .slider {
            display: block;
            margin-top: 10px;
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            background: #bbb;
            border-radius: 2px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #FFF;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #FFF;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .slider::-moz-range-track {
            height: 4px;
            background: #bbb;
            border-radius: 2px;
        }

        #evolution {
            position: fixed;
            bottom: 40px;
            right: 30px;
            /*transform: translateX(-50%); */
            background: rgba(255, 255, 255, 0.05);
            z-index: 1000;
            display: flex;
            gap: 5px;
        }

        button {
            padding: 10px 10px;
            cursor: pointer;
            background: #bbb;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-btn"><img src="materials/square.png"></a>
        <a href="gallery.html" class="nav-btn"><img src="materials/grid.png"></a>
    </nav>
    <div id="controls">
        <div class="slider-container">
            <label for="popultation-size">Population Size:</label>
            <input type="range" min="2" max="100" class="slider" id="popultation-size">
        </div>
        <div class="slider-container">
            <label for="individuals-show">Individuals Shown:</label>
            <input type="range" min="2" max="100" class="slider" id="individuals-show">
        </div>
        <div class="slider-container">
            <label for="workers">Number of Workers:</label>
            <input type="range" min="2" max="8" class="slider" id="workers">
        </div>
        <button id="orbit-toggle">Orbit Together</button>
    </div>
    <div id="evolution">
        <button id="next-gen-btn">Evolve</button>
        <button id="reset-btn">Reset</button>
    </div>

    <canvas id="canvas"></canvas>
    <div id="content"></div>
    <script type="module" src="gallery.js"></script>
</body>

</html>
