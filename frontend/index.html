<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala Geometry Lab</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three",
          "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.7.3",
          "@jgphilpott/polyslice": "https://unpkg.com/@jgphilpott/polyslice/dist/index.browser.esm.js"
        }
      }
    </script>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <nav>
        <a href="index.html" class="nav-btn"><img src="materials/square.png"></a>
        <a href="gallery.html" class="nav-btn"><img src="materials/grid.png"></a>
        <a href="favorites.html" class="nav-btn"><img src="materials/heart.png"></a>
    </nav>

    <div id="dimensions-label" style="
        position: absolute; 
        bottom: 20px; 
        left: 20px; 
        color: white; 
        font-family: monospace; 
        background: rgba(0,0,0,0.5); 
        padding: 10px; 
        pointer-events: none; 
        border-left: 3px solid #b49e68;">
        Width: 0mm<br>
        Depth: 0mm<br>
        Height: 0mm
    </div>

    <div id="fitness-panel" style="
        position: absolute; 
        top: 20px; 
        left: 20px; 
        width: 280px;
        color: white; 
        font-family: 'Inter', sans-serif; 
        background: rgba(0,0,0,0.8); 
        padding: 15px; 
        border-radius: 8px;
        border-left: 5px solid #666;
        pointer-events: none;
        display: none; 
        backdrop-filter: blur(10px);
        z-index: 3000;">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Fitness Report
        </h3>
        <div id="fitness-content" style="font-size: 13px; line-height: 1.4;">
        </div>
    </div>

    <script type="module" src="editor.js"></script>
</body>

</html>
